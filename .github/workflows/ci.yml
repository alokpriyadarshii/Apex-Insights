name: CI

on:
  push:
  pull_request:

jobs:
  python-lakehouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Lint Python
        run: python -m ruff check src tests/python

      - name: Run Python tests
        run: python -m pytest

      - name: Run PySpark lakehouse pipeline
        run: python -m apex_insights.pipeline

      - name: Validate generated lakehouse artifacts
        run: make validate-parquet

  r-cmd-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'
      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfribidi-dev \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libglpk-dev \
            libharfbuzz-dev \
            libjpeg-dev \
            libpng-dev \
            pkg-config \
            libtiff5-dev \
            libwebp-dev \
            libxml2-dev \
            libx11-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Install lintr
        run: R -q -e 'install.packages("lintr")'


      - name: Run tests
        run: R -q -e 'testthat::test_dir("tests/testthat")'

      - name: Lint
        run: R -q -e 'lintr::lint_dir("R")'
